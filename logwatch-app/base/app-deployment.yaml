apiVersion: apps/v1
kind: Deployment
metadata:
  name: logwatch-app
  namespace: wms-proto
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: logwatch-app
  template:
    metadata:
      labels:
        app: logwatch-app
    spec:
      imagePullSecrets:
        - name: nexus-docker-creds
      containers:
        - name: logwatch-app
          image: 10.96.191.117:8082/logwatch-app:proto-1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: DEPLOY_ENV
              value: proto
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/wms
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "logwatch-kafka:9094"
            - name: WMS_ELASTIC_ENABLED
              value: "false"
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /api/logwatch/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/logwatch/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 10
