apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-kafka
  namespace: wms-proto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-kafka
  template:
    metadata:
      labels:
        app: notification-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:5.4.4
          ports:
            - containerPort: 9094
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: notification-zookeeper:2181
            - name: KAFKA_ADVERTISED_LISTENERS
              value: INTERNAL://notification-kafka:9094,OUTSIDE://localhost:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: INTERNAL
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
