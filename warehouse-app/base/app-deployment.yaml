apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-app
  namespace: wms-proto
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: warehouse-app
  template:
    metadata:
      labels:
        app: warehouse-app
    spec:
      imagePullSecrets:
        - name: nexus-docker-creds
      initContainers:
        - name: init-db-schemas
          image: postgres:12.8
          env:
            - name: PGPASSWORD
              value: postgres
          command:
            - sh
            - -c
            - |
              psql -h warehouse-postgres -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'warehouse'" | grep -q 1 || \
              psql -h warehouse-postgres -U postgres -d postgres -c 'CREATE DATABASE warehouse;'
              until pg_isready -h warehouse-postgres -p 5432 -U postgres; do
                sleep 2
              done
              psql -h warehouse-postgres -U postgres -d warehouse -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
              psql -h warehouse-postgres -U postgres -d warehouse -c 'CREATE EXTENSION IF NOT EXISTS ltree;'
      containers:
        - name: warehouse-app
          image: 10.96.191.117:8082/warehouse-app:jenkins-20
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: DEPLOY_ENV
              value: proto
            - name: DB_URL
              value: jdbc:postgresql://warehouse-postgres:5432/warehouse
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: warehouse-kafka:9094
            - name: APP_HAZELCAST_NETWORK_CLUSTER_MEMBERS_0
              value: warehouseapp-hazelcast:5701
            - name: SERVER_PORT
              value: "8081"
          readinessProbe:
            httpGet:
              path: /api/warehouse/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/warehouse/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 180
            periodSeconds: 10
