apiVersion: v1
kind: ConfigMap
metadata:
  name: warehouse-postgres-init
  namespace: wms-proto
data:
  01-init-databases.sh: |
    #!/bin/bash
    set -e

    # =============================================================================
    # Initialize all WMS databases in a single PostgreSQL instance.
    # The "warehouse" DB is created automatically via POSTGRES_DB env var.
    # This script creates the remaining databases + required extensions.
    # =============================================================================

    echo "=== Creating WMS databases ==="

    DATABASES=(
      "om"
      "wms"
      "inbound"
      "pim"
      "manufacturing"
      "quality"
      "yard"
      "sapintegrationapp"
      "frontstoreapp"
      "resource"
      "transfer"
    )

    for db in "${DATABASES[@]}"; do
      echo "Creating database: $db"
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        SELECT 'CREATE DATABASE $db' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$db')\gexec
    EOSQL
    done

    # --- Extensions for warehouse DB (ltree, pg_partman) ---
    echo "=== Setting up extensions for warehouse DB ==="
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "warehouse" <<-EOSQL
      CREATE EXTENSION IF NOT EXISTS ltree;
      CREATE SCHEMA IF NOT EXISTS partman;
      CREATE EXTENSION IF NOT EXISTS pg_partman SCHEMA partman;
    EOSQL

    # --- pg_partman background worker ---
    echo "ADDING pg_partman_bgw TO postgresql.conf"
    echo "shared_preload_libraries = 'pg_partman_bgw'" >> "$PGDATA/postgresql.conf"
    echo "pg_partman_bgw.interval = 3600" >> "$PGDATA/postgresql.conf"
    echo "pg_partman_bgw.role = '$POSTGRES_USER'" >> "$PGDATA/postgresql.conf"
    echo "pg_partman_bgw.dbname = warehouse" >> "$PGDATA/postgresql.conf"

    echo "=== All databases created ==="
