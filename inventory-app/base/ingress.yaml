apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventory-app
  namespace: wms-proto
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-app
                port:
                  number: 8080
