apiVersion: apps/v1
kind: Deployment
metadata:
  name: mechanization-manager-zookeeper
  namespace: wms-proto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mechanization-manager-zookeeper
  template:
    metadata:
      labels:
        app: mechanization-manager-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:5.4.4
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
