apiVersion: v1
kind: ConfigMap
metadata:
  name: mechanization-manager-postgres-init
  namespace: wms-proto
data:
  01-init-database.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE SCHEMA IF NOT EXISTS partman;
      CREATE EXTENSION IF NOT EXISTS pg_partman SCHEMA partman;
    EOSQL

    echo "shared_preload_libraries = 'pg_partman_bgw'" >> "$PGDATA/postgresql.conf"
    echo "pg_partman_bgw.interval = 3600" >> "$PGDATA/postgresql.conf"
    echo "pg_partman_bgw.role = '$POSTGRES_USER'" >> "$PGDATA/postgresql.conf"
    echo "pg_partman_bgw.dbname = wms" >> "$PGDATA/postgresql.conf"
